services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: abduction_research
      POSTGRES_USER: researcher
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed — only reachable by other containers on this network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researcher -d abduction_research"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://researcher:${DB_PASSWORD}@db:5432/abduction_research
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: production
      STORAGE_PATH: /storage
      ALLOWED_ORIGINS: https://${DOMAIN}
    volumes:
      # Source code is NOT mounted — image contains the baked code
      - ./storage:/storage
    # No ports exposed — Nginx reaches backend via internal network

  # ── Frontend build ──────────────────────────────────────────────────────────
  # This is a one-shot build container, not a running service.
  # It compiles the React app and exits. Nginx then serves the output.
  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    environment:
      # Empty string means axios uses relative URLs (/api/...), which is correct
      # because Nginx proxies /api → backend on the same origin
      VITE_API_URL: ""
    command: sh -c "npm install && npm run build"
    profiles:
      - build   # run manually: docker compose --profile build run --rm frontend-build

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ./storage:/storage:ro                          # if you ever serve files directly
      - certbot_www:/var/www/certbot:ro                # ACME challenge files
      - certbot_certs:/etc/letsencrypt:ro              # TLS certificates
    command: >
      sh -c "nginx -g 'daemon off;'"

  # ── Certbot ─────────────────────────────────────────────────────────────────
  # Obtains and renews Let's Encrypt certificates.
  # Runs once to obtain, then sleeps and renews every 12 hours.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # After the first manual cert issuance (see README), this keeps it renewed.
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  postgres_data:
  frontend_dist:
  certbot_www:
  certbot_certs:
