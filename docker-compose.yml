services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: abduction_research
      POSTGRES_USER: researcher
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researcher -d abduction_research"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://researcher:${DB_PASSWORD:-changeme}@db:5432/abduction_research
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      STORAGE_PATH: /storage
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    profiles:
      - frontend  # only started when: docker compose --profile frontend up

volumes:
  postgres_data:
