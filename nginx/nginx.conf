events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Sensible defaults ──────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;   # allow PDF uploads up to 50 MB; adjust if needed

    # ── HTTP — redirect everything to HTTPS ────────────────────────────────────
    # Exception: Let's Encrypt ACME challenge must be served over plain HTTP
    server {
        listen 80;
        server_name research.yourdomain.com;

        # Let's Encrypt webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name research.yourdomain.com;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/research.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/research.yourdomain.com/privkey.pem;

        # Modern TLS settings (safe defaults)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        # ── API — proxy to FastAPI backend ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Expose the custom warning headers your backend sends
            add_header Access-Control-Expose-Headers "X-Warning, X-Warning-Anomalous, X-Warning-Falsification" always;

            # Generous timeout for long AI ingestion requests
            proxy_read_timeout 120s;
        }

        # ── Health check endpoint ─────────────────────────────────────────────
        location /health {
            proxy_pass http://backend:8000/health;
        }

        # ── Frontend — serve static React build ───────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA routing: unknown paths → index.html (React Router handles them)
            try_files $uri $uri/ /index.html;
        }
    }
}
